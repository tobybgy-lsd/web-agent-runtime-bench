name: Bug report
description: Report a bug in Agent Failure Doctor itself.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please include version and commands. Do not include secrets.

        Install:
        ```powershell
        python -m pip install agent-failure-doctor
        ```

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: failure-doctor --version or package version
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      render: powershell
      placeholder: failure-doctor collect --project . --preset auto --out .\report
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      render: text
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I removed secrets, tokens, cookies, and private customer data.
          required: true
