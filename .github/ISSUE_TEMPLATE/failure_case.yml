name: Submit a sanitized failure case
description: Share a sanitized failure artifact, log, trace, or description.
title: "[Failure Case]: "
labels:
  - failure-case
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing a failure case. Please remove secrets before posting.
        Do not include passwords, API keys, cookies, tokens, authorization headers,
        private screenshots, customer data, personal data, or private URLs.
  - type: textarea
    id: what-failed
    attributes:
      label: What failed?
      description: Briefly describe the automation, agent, crawler, or RPA run that failed.
      placeholder: The browser agent timed out after clicking Export.
    validations:
      required: true
  - type: dropdown
    id: tool
    attributes:
      label: Tool
      description: Playwright / browser-use / Scrapy / requests / Codex / RPA / other
      options:
        - Playwright
        - browser-use
        - Scrapy
        - requests
        - Codex
        - RPA
        - other
    validations:
      required: true
  - type: checkboxes
    id: input-type
    attributes:
      label: Input type
      description: trace.zip / error.log / console.txt / network.json / screenshot / description
      options:
        - label: trace.zip
        - label: error.log
        - label: console.txt
        - label: network.json
        - label: screenshot
        - label: description
  - type: textarea
    id: expected-result
    attributes:
      label: Expected result
      placeholder: The script should download the report file.
    validations:
      required: true
  - type: textarea
    id: actual-result
    attributes:
      label: Actual result
      placeholder: The script clicked the button, but no file was saved.
    validations:
      required: true
  - type: textarea
    id: sanitized-error-excerpt
    attributes:
      label: Sanitized error excerpt
      description: Paste only sanitized excerpts. Remove secrets and private data.
      render: text
  - type: dropdown
    id: public-test-case
    attributes:
      label: Can this become a public test case?
      options:
        - "yes"
        - "no"
        - "not sure"
    validations:
      required: true
  - type: checkboxes
    id: sanitized-confirmation
    attributes:
      label: Sanitization confirmation
      options:
        - label: I confirm this report contains no credentials/cookies/tokens/private data.
          required: true
