name: benchmark

on:
  push:
  pull_request:

jobs:
  standard-suite:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Unit tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Standard benchmark suite
        shell: pwsh
        run: python tools\benchmark\run_benchmark.py --out-dir sample_run\benchmark --node node

      - name: Smoke test
        shell: pwsh
        run: .\scripts\smoke_test.ps1

      - name: Safety scan
        shell: pwsh
        run: .\scripts\local_safety_scan.ps1

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            sample_run/benchmark/benchmark_report.json
            sample_run/benchmark/benchmark_report.md
