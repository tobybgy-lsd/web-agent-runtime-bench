<!doctype html>
<html>
  <head>
    <title>Sign in required</title>
  </head>
  <body>
    <main>
      <form id="login-form" action="/login" method="post">
        <label>Email <input name="email" autocomplete="username" value=""></label>
        <label>Password <input name="password" type="password" autocomplete="current-password" value=""></label>
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
