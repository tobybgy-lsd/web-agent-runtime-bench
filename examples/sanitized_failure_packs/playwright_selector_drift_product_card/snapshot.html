<!doctype html>
<html>
  <head>
    <title>Sanitized product card</title>
  </head>
  <body>
    <main>
      <article class="product-card redesigned" data-testid="product-card">
        <h1>Sample Widget</h1>
        <div class="priceBlock">
          <span class="currency">$</span><span class="amount" data-testid="price-value" itemprop="price">19.99</span>
        </div>
        <p class="stock-state">In stock</p>
      </article>
    </main>
  </body>
</html>
